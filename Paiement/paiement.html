<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Villa Nova - Billetterie officielle. Réservez vos places pour les meilleurs concerts, cinémas et spectacles. Expérience live garantie.">
    <title>Villa Nova | Paiement Sécurisé</title>

    <link rel="icon" type="image/png" href="../asset/favicon/symbole-villanova.webp?v=1">
    <link rel="stylesheet" href="../css/main.css">
    
    <script src="./paiement.js" defer></script>
</head>

<body>

    <header class="main-header" role="banner">
        <div class="container">
            <a href="../index.html" class="logo-group" aria-label="Villa Nova - Retour à l'accueil">
                <picture>
                    <source srcset="../asset/logo/logo-villanova.webp" type="image/webp">
                    <img src="../asset/logo/logo-villanova.webp" alt="Logo Villa Nova" class="logo-img" width="45"
                        height="45" decoding="async">
                </picture>
                <span class="logo-text">Villa Nova</span>
            </a>

            <nav aria-label="Navigation utilitaire">
                <a href="../Panier/panier.html" class="btn-cart">
                    Panier
                </a>
            </nav>
        </div>
    </header>

    <main class="payment-container">
        <div class="container">
            <h1 class="payment-title">Finaliser votre commande</h1>

            <div class="payment-layout">
                <section class="payment-card">
                    <form id="payment-form" class="payment-form" novalidate>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="last-name">Nom</label>
                                <input type="text" id="last-name" placeholder="Smith" required>
                                <span class="error-hint"></span>
                            </div>
                            <div class="form-group">
                                <label for="first-name">Prénom</label>
                                <input type="text" id="first-name" placeholder="Jane" required>
                                <span class="error-hint"></span>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="email">Adresse email</label>
                                <input type="email" id="email" placeholder="exemple@exemple.com" required>
                                <span class="error-hint"></span>
                            </div>
                            <div class="form-group">
                                <label for="payment-type">Type de paiement</label>
                                <select id="payment-type" class="custom-select">
                                    <option value="visa">Visa / Mastercard</option>
                                    <option value="paypal">Paypal</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="card-number">Numéro de Carte</label>
                            <input type="text" id="card-number" placeholder="XXXX-XXXX-XXXX-XXXX" maxlength="19"
                                required>
                            <span class="error-hint"></span>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="expiry">Date d'expiration</label>
                                <input type="text" id="expiry" placeholder="MM/YY" maxlength="5" required>
                                <span class="error-hint"></span>
                            </div>
                            <div class="form-group">
                                <label for="cvc">CVC</label>
                                <input type="text" id="cvc" placeholder="XXX" maxlength="3" required>
                                <span class="error-hint"></span>
                            </div>
                        </div>

                        <button type="submit" class="btn-submit-payment">Confirmer le paiement</button>
                    </form>
                </section>

                <aside class="order-summary">
                    <div class="summary-content">
                        <h3>Votre commande</h3>

                        <div class="summary-items">
                            </div>

                        <hr class="summary-divider">

                        <div class="summary-total">
                            <span>Total à régler</span>
                            <span class="price" id="payment-final-total">0,00€</span>
                        </div>

                        <div class="security-badge">
                            <span class="icon">🔒</span> Paiement 100% sécurisé
                        </div>
                    </div>
                </aside>
            </div>
        </div>
    </main>

    <footer class="main-footer" role="contentinfo">
        <div class="container">
            <div class="footer-top">
                <div class="footer-brand">Villa Nova</div>
                <div class="footer-links">
                    <div class="footer-col">
                        <p class="footer-col-title">Assistance</p>
                        <ul>
                            <li><a href="../Contact/contact.html">Nous contacter</a></li>
                            <li><a href="#">Support technique</a></li>
                            <li><a href="#">FAQ / Aide</a></li>
                        </ul>
                    </div>
                </div>
            </div>
            <div class="footer-bottom">
                <nav class="socials" aria-label="Suivez-nous sur les réseaux sociaux">
                    <a href="https://github.com/daroueche-mari" target="_blank" rel="noopener noreferrer">
                        <img src="../asset/social-icon/icons8-github-50.png" alt="GitHub" class="social-icon" width="30" height="30">
                    </a>
                    <a href="https://www.linkedin.com/" target="_blank" rel="noopener noreferrer">
                        <img src="../asset/social-icon/icons8-linkedin-48.png" alt="LinkedIn" class="social-icon" width="30" height="30">
                    </a>
                </nav>
                <p class="copyright">&copy; 2026 Villa Nova. Tous droits réservés.</p>
            </div>
        </div>
    </footer>

    <div id="toast-container" aria-live="assertive" aria-atomic="true"></div>

</body>
</html>
